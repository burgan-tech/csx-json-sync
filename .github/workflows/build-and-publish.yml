name: Build and Publish VSIX Extension

on:
  push:
    branches:
      - 'release-v*'
  workflow_dispatch:
    inputs:
      version_override:
        description: 'Override version (e.g., 1.0.6). Leave empty to auto-calculate from branch.'
        required: false
        type: string
      force_publish:
        description: 'Force publish extension even if it already exists'
        required: false
        default: false
        type: boolean
      registry_target:
        description: 'Target registry for publishing'
        required: false
        default: 'github'
        type: choice
        options:
          - 'github'
          - 'marketplace'
          - 'both'

permissions:
  contents: write
  packages: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    
    outputs:
      version: ${{ steps.version.outputs.version }}
      published: ${{ steps.publish.outputs.published }}
      vsix_file: ${{ steps.build.outputs.vsix_file }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Fetch all history for version calculation
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        registry-url: 'https://npm.pkg.github.com'
        cache: 'npm'
    
    - name: Install VSCE (Visual Studio Code Extension Manager)
      run: |
        npm install -g @vscode/vsce
        echo "VSCE installed successfully"
        vsce --version
    
    - name: Calculate version
      id: version
      run: |
        # Check if version is manually provided
        if [ -n "${{ github.event.inputs.version_override }}" ]; then
          VERSION="${{ github.event.inputs.version_override }}"
          echo "Using manual version override: $VERSION"
        else
          # Extract version from branch name (e.g., release-v1.0 -> 1.0)
          BRANCH_NAME="${{ github.ref_name }}"
          
          if [[ "$BRANCH_NAME" =~ ^release-v([0-9]+\.[0-9]+)$ ]]; then
            BASE_VERSION="${BASH_REMATCH[1]}"
            echo "Base version from branch: $BASE_VERSION"
            
            # Find the next available patch version
            PATCH=0
            while true; do
              VERSION="${BASE_VERSION}.${PATCH}"
              TAG="v${VERSION}"
              
              # Check if this tag already exists
              if git tag -l "$TAG" | grep -q "^$TAG$"; then
                echo "Version $VERSION already exists, trying next patch version..."
                PATCH=$((PATCH + 1))
              else
                echo "Found available version: $VERSION"
                break
              fi
              
              # Safety check to prevent infinite loop
              if [ $PATCH -gt 100 ]; then
                echo "Error: Could not find available patch version after 100 attempts"
                exit 1
              fi
            done
          else
            # Fallback to version from package.json and increment patch
            echo "Branch name doesn't match release-vX.Y pattern, using version from package.json"
            CURRENT_VERSION=$(node -p "require('./package.json').version")
            
            if [ -z "$CURRENT_VERSION" ]; then
              echo "Error: Could not determine version from package.json"
              exit 1
            fi
            
            # Split version into parts and increment patch
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"
            PATCH=$((PATCH + 1))
            VERSION="${MAJOR}.${MINOR}.${PATCH}"
            echo "Incremented version: $VERSION"
          fi
        fi
        
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Final version: $VERSION"
    
    - name: Update version in package.json
      run: |
        VERSION="${{ steps.version.outputs.version }}"
        npm version "$VERSION" --no-git-tag-version
        echo "Updated package.json with version $VERSION"
        
        # Show the updated extension info
        echo "Extension details:"
        cat package.json | jq '.name, .displayName, .version, .description'
    
    - name: Install dependencies
      run: |
        echo "Installing dependencies..."
        npm ci
        echo "Dependencies installed successfully"
    
    - name: Lint code
      run: |
        echo "Running linter..."
        if npm run lint --silent > /dev/null 2>&1; then
          npm run lint
          echo "Linting completed successfully"
        else
          echo "No lint script found, skipping linting"
        fi
    
    - name: Compile TypeScript
      run: |
        echo "Compiling TypeScript..."
        npm run compile
        echo "TypeScript compilation completed"
        
        # Verify compiled output exists
        if [ -f "./out/extension.js" ]; then
          echo "✅ Main extension file compiled successfully"
          ls -la out/
        else
          echo "❌ Extension compilation failed - main file not found"
          exit 1
        fi
    
    - name: Run tests
      run: |
        echo "Running tests..."
        if npm run test --silent > /dev/null 2>&1; then
          npm test
          echo "All tests passed!"
        else
          echo "No test script found or tests not properly configured"
          echo "Running basic validation instead..."
          
          # Basic validation - check if compiled extension exists and is valid
          if [ -f "./out/extension.js" ]; then
            echo "✅ Compiled extension exists: ./out/extension.js"
            # Try to require the extension to check for syntax errors
            if node -c "./out/extension.js"; then
              echo "✅ Compiled extension has valid syntax"
            else
              echo "❌ Compiled extension has syntax errors"
              exit 1
            fi
          else
            echo "❌ Compiled extension not found: ./out/extension.js"
            exit 1
          fi
        fi
    
    - name: Build VSIX package
      id: build
      run: |
        VERSION="${{ steps.version.outputs.version }}"
        EXTENSION_NAME=$(node -p "require('./package.json').name")
        
        echo "Building VSIX package..."
        
        # Build the VSIX package
        vsce package --out "${EXTENSION_NAME}-${VERSION}.vsix"
        
        VSIX_FILE="${EXTENSION_NAME}-${VERSION}.vsix"
        
        if [ -f "$VSIX_FILE" ]; then
          echo "✅ VSIX package created successfully: $VSIX_FILE"
          ls -la "$VSIX_FILE"
          
          # Get package size
          SIZE=$(stat -c%s "$VSIX_FILE" 2>/dev/null || stat -f%z "$VSIX_FILE" 2>/dev/null || echo "unknown")
          echo "Package size: $SIZE bytes"
          
          # Verify package contents
          echo "VSIX package contents:"
          unzip -l "$VSIX_FILE" | head -20
          
          echo "vsix_file=$VSIX_FILE" >> $GITHUB_OUTPUT
        else
          echo "❌ Failed to create VSIX package"
          ls -la *.vsix || echo "No VSIX files found"
          exit 1
        fi
    
    - name: Upload VSIX as artifact
      uses: actions/upload-artifact@v4
      with:
        name: vsix-package-${{ steps.version.outputs.version }}
        path: "*.vsix"
        retention-days: 30
    
    - name: Publish Extension
      id: publish
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        VSCE_PAT: ${{ secrets.VSCE_PAT }}
      run: |
        REGISTRY_TARGET="${{ github.event.inputs.registry_target || 'github' }}"
        PUBLISHED="false"
        VSIX_FILE="${{ steps.build.outputs.vsix_file }}"
        
        echo "🚀 Publishing extension to $REGISTRY_TARGET..."
        
        # Function to publish to GitHub Releases
        publish_to_github() {
          echo "📦 Preparing VSIX for GitHub Release..."
          
          if [ -z "$GITHUB_TOKEN" ]; then
            echo "❌ Error: GITHUB_TOKEN is not available"
            return 1
          fi
          
          if [ ! -f "$VSIX_FILE" ]; then
            echo "❌ Error: VSIX file not found: $VSIX_FILE"
            return 1
          fi
          
          echo "✅ VSIX file ready for GitHub release"
          echo "File: $VSIX_FILE"
          echo "Size: $(stat -c%s "$VSIX_FILE" 2>/dev/null || stat -f%z "$VSIX_FILE" 2>/dev/null) bytes"
          return 0
        }
        
        # Function to publish to VS Code Marketplace
        publish_to_marketplace() {
          echo "📦 Publishing to VS Code Marketplace..."
          
          if [ -z "$VSCE_PAT" ]; then
            echo "❌ Error: VSCE_PAT secret is not configured"
            echo "Please add your Visual Studio Marketplace Personal Access Token as a repository secret named 'VSCE_PAT'"
            echo "Get your token from: https://dev.azure.com/"
            return 1
          fi
          
          # Publish to marketplace
          if vsce publish --pat "$VSCE_PAT" --packagePath "$VSIX_FILE"; then
            echo "✅ Successfully published to VS Code Marketplace"
            return 0
          else
            echo "❌ Failed to publish to VS Code Marketplace"
            return 1
          fi
        }
        
        # Publish based on target
        SUCCESS_COUNT=0
        TOTAL_ATTEMPTS=0
        
        case "$REGISTRY_TARGET" in
          "github")
            TOTAL_ATTEMPTS=1
            if publish_to_github; then
              SUCCESS_COUNT=1
              PUBLISHED="true"
            fi
            ;;
          "marketplace")
            TOTAL_ATTEMPTS=1
            if publish_to_marketplace; then
              SUCCESS_COUNT=1
              PUBLISHED="true"
            fi
            ;;
          "both")
            TOTAL_ATTEMPTS=2
            if publish_to_github; then
              SUCCESS_COUNT=$((SUCCESS_COUNT + 1))
              PUBLISHED="true"
            fi
            
            if publish_to_marketplace; then
              SUCCESS_COUNT=$((SUCCESS_COUNT + 1))
              PUBLISHED="true"
            fi
            ;;
        esac
        
        echo "published=$PUBLISHED" >> $GITHUB_OUTPUT
        
        echo "📊 Publication Summary:"
        echo "   Successfully published: $SUCCESS_COUNT/$TOTAL_ATTEMPTS targets"
        
        if [ "$SUCCESS_COUNT" -eq 0 ]; then
          echo "❌ Failed to publish to any target"
          if [ "${{ github.event.inputs.force_publish }}" != "true" ]; then
            echo "💡 Tip: If you want to republish existing versions, use the 'force_publish' option"
          fi
          exit 1
        elif [ "$SUCCESS_COUNT" -lt "$TOTAL_ATTEMPTS" ]; then
          echo "⚠️  Some targets failed, but at least one succeeded"
        else
          echo "🎉 Published to all targets successfully!"
        fi
    
    - name: Create Git Tag
      if: steps.publish.outputs.published == 'true'
      run: |
        VERSION="${{ steps.version.outputs.version }}"
        TAG="v$VERSION"
        
        # Create and push the tag
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        
        if git tag -l "$TAG" | grep -q "^$TAG$"; then
          echo "⚠️  Tag $TAG already exists, skipping tag creation"
        else
          git tag -a "$TAG" -m "Release version $VERSION"
          git push origin "$TAG"
          echo "✅ Created and pushed tag: $TAG"
        fi
    
    - name: Create GitHub Release
      if: steps.publish.outputs.published == 'true'
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v${{ steps.version.outputs.version }}
        release_name: Release v${{ steps.version.outputs.version }}
        body: |
          ## 🚀 CSX-JSON Sync Extension v${{ steps.version.outputs.version }}
          
          ### 📦 Installation
          
          #### From VSIX file:
          1. Download the `.vsix` file from the assets below
          2. Open VS Code
          3. Go to Extensions view (Ctrl+Shift+X)
          4. Click on "..." menu and select "Install from VSIX..."
          5. Select the downloaded `.vsix` file
          
          ### 🔧 Features
          - Automatically syncs CSX files to JSON files with base64 encoding
          - Base64 code preview on hover in JSON files
          - Works with VNext workflow engine projects
          - Auto-sync on file changes with configurable debounce
          - Manual sync commands for individual or all CSX files
          - Context menu integration for CSX files
          
          ### 📋 Usage
          1. Open a VNext project with `vnext.config.json`
          2. The extension will automatically detect CSX files in your project structure
          3. Changes to CSX files will be automatically synced to corresponding JSON files
          4. Hover over base64 code in JSON files to see decoded C# code
          5. Use Command Palette (Ctrl+Shift+P) for manual sync commands
          
          ### 🔗 Links
          - [GitHub Repository](https://github.com/${{ github.repository }})
          - [Documentation](https://github.com/${{ github.repository }}#readme)
          
          ### 📋 Changes
          See [README.md](https://github.com/${{ github.repository }}/blob/main/README.md) for detailed features and changes.
          
          ---
          *This release was automatically created by GitHub Actions*
        draft: false
        prerelease: false
    
    - name: Upload VSIX to Release
      if: steps.publish.outputs.published == 'true'
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ${{ steps.build.outputs.vsix_file }}
        asset_name: ${{ steps.build.outputs.vsix_file }}
        asset_content_type: application/zip
    
    - name: Summary
      if: always()
      run: |
        echo "## 📦 VS Code Extension Publishing Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Extension Information" >> $GITHUB_STEP_SUMMARY
        echo "- **Name**: \`csx-json-sync\`" >> $GITHUB_STEP_SUMMARY
        echo "- **Display Name**: CSX-JSON Sync" >> $GITHUB_STEP_SUMMARY
        echo "- **Version**: ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Published**: ${{ steps.publish.outputs.published }}" >> $GITHUB_STEP_SUMMARY
        echo "- **VSIX File**: ${{ steps.build.outputs.vsix_file }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        if [ -n "${{ github.event.inputs.version_override }}" ]; then
          echo "- **Version Override**: Used manual version override" >> $GITHUB_STEP_SUMMARY
        fi
        
        if [ "${{ github.event.inputs.force_publish }}" == "true" ]; then
          echo "- **Force Publish**: Enabled" >> $GITHUB_STEP_SUMMARY
        fi
        
        REGISTRY_TARGET="${{ github.event.inputs.registry_target || 'github' }}"
        echo "- **Target Registry**: $REGISTRY_TARGET" >> $GITHUB_STEP_SUMMARY
        
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 🔧 Extension Information" >> $GITHUB_STEP_SUMMARY
        echo "This VS Code extension automatically syncs changes in CSX files to JSON files with base64 format in VNext workflow engine projects." >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Key Features:**" >> $GITHUB_STEP_SUMMARY
        echo "- Auto-sync CSX files to JSON with base64 encoding" >> $GITHUB_STEP_SUMMARY
        echo "- VNext project structure integration" >> $GITHUB_STEP_SUMMARY
        echo "- Configurable debounce timing" >> $GITHUB_STEP_SUMMARY
        echo "- Manual sync commands" >> $GITHUB_STEP_SUMMARY
        echo "- Context menu integration" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        if [ "${{ steps.publish.outputs.published }}" == "true" ]; then
          echo "### 🎉 Published Successfully!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📋 Installation Instructions" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### From VSIX File" >> $GITHUB_STEP_SUMMARY
          echo "1. Download the VSIX file from the [release assets](https://github.com/${{ github.repository }}/releases/tag/v${{ steps.version.outputs.version }})" >> $GITHUB_STEP_SUMMARY
          echo "2. Open VS Code" >> $GITHUB_STEP_SUMMARY
          echo "3. Go to Extensions view (Ctrl+Shift+X)" >> $GITHUB_STEP_SUMMARY
          echo "4. Click \"...\" menu → \"Install from VSIX...\"" >> $GITHUB_STEP_SUMMARY
          echo "5. Select the downloaded VSIX file" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### From GitHub CLI" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "gh release download v${{ steps.version.outputs.version }} --repo ${{ github.repository }} --pattern '*.vsix'" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
        else
          echo "### ❌ Publication Failed" >> $GITHUB_STEP_SUMMARY
          echo "The extension was not successfully published. Check the workflow logs for details." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
        fi
        
        echo "### 🔗 Quick Links" >> $GITHUB_STEP_SUMMARY
        echo "- [GitHub Repository](https://github.com/${{ github.repository }})" >> $GITHUB_STEP_SUMMARY
        echo "- [GitHub Releases](https://github.com/${{ github.repository }}/releases)" >> $GITHUB_STEP_SUMMARY
        echo "- [Workflow Artifacts](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
        echo "- [Extension Documentation](https://github.com/${{ github.repository }}#readme)" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📋 Next Steps" >> $GITHUB_STEP_SUMMARY
        echo "1. Extension will be available for download from GitHub releases" >> $GITHUB_STEP_SUMMARY
        echo "2. Install the extension using the VSIX file from GitHub releases" >> $GITHUB_STEP_SUMMARY
        echo "3. Open a VNext project with vnext.config.json to start using the extension" >> $GITHUB_STEP_SUMMARY
        echo "4. Configure auto-sync settings in VS Code preferences if needed" >> $GITHUB_STEP_SUMMARY